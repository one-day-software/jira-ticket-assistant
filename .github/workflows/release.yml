name: Release
run-name: Release ${{ inputs.releaseVersion }} by ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "The release version in <MAJOR>.<MINOR>.<PATCH> format"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release version
        run: |
          expr "${{ github.event.inputs.releaseVersion }}" : '\(^[0-9]\+\.[0-9]\+\.[0-9]\+$\)'

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git user
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump manifest.json version
        run: |
          tmp=$(mktemp)
          jq --arg v "${{ github.event.inputs.releaseVersion }}" '.version = $v' manifest.json > "$tmp"
          mv "$tmp" manifest.json
          cat manifest.json | grep '"version"'

      - name: Commit and tag
        run: |
          git add manifest.json
          git commit -m "release v${{ github.event.inputs.releaseVersion }}"
          git tag "v${{ github.event.inputs.releaseVersion }}"
          git push origin HEAD
          git push origin "v${{ github.event.inputs.releaseVersion }}"

      - name: Package extension
        run: |
          zip -r "jira-ticket-assistant-v${{ github.event.inputs.releaseVersion }}.zip" . \
            -x "*.git*" \
            -x ".claude/*" \
            -x ".github/*" \
            -x "CLAUDE.md" \
            -x "*.DS_Store" \
            -x "*.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.releaseVersion }}
          name: v${{ github.event.inputs.releaseVersion }}
          generate_release_notes: true
          files: jira-ticket-assistant-v${{ github.event.inputs.releaseVersion }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
